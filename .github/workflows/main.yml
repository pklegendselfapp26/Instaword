name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # CRITICAL: Added libtool and libltdl-dev for Kivy 2.3.0 support
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool libltdl-dev pkg-config zlib1g-dev libncurses-dev \
            libtinfo6 cmake libffi-dev libssl-dev lld gettext
      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools virtualenv
      - name: Build with Buildozer
        run: |
          buildozer appclean || true
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Insta-Word-APK
          path: bin/*.apk

